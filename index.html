<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedId = null;
let allEvents = [];

// 🔒 CODE ADMIN
const ADMIN_CODE = "0208";
let isAdmin = false;

function checkCode() {
    if (isAdmin) return true;
    let code = prompt("Code administrateur :");
    if (code === ADMIN_CODE) {
        isAdmin = true;
        return true;
    }
    return false;
}

// 🔄 charger
function chargerEvents() {

    db.collection("events").get().then(snapshot => {

        allEvents = [];

        snapshot.forEach(doc => {
            let e = doc.data();

            if (!e.dateDebut) {
                e.dateDebut = e.date;
                e.dateFin = e.date;
            }

            e.id = doc.id;
            allEvents.push(e);
        });

        afficherEvents();
    });
}

// 🔍 afficher
function afficherEvents() {

    let list = document.getElementById("list");
    list.innerHTML = "";

    let filtre = document.getElementById("filtre").value;

    let events = allEvents
        .filter(e => filtre === "all" || e.type === filtre)
        .sort((a,b) => {
            let da = a.dateDebut.split("-").reverse().join("");
            let db = b.dateDebut.split("-").reverse().join("");
            return da - db;
        });

    let currentMonth = "";

    events.forEach(e => {

        let parts = e.dateDebut.split("-");
        let mois = parts[1] + "-" + parts[2];

        if (mois !== currentMonth) {
            currentMonth = mois;

            let m = document.createElement("div");
            m.className = "month";
            m.innerText = formatMonth(mois);
            list.appendChild(m);
        }

        let dateTxt = e.dateDebut;
        if (e.dateFin && e.dateFin !== e.dateDebut) {
            dateTxt += " → " + e.dateFin;
        }

        let div = document.createElement("div");
        div.className = "event " + e.type;

        div.innerHTML = `
            <div class="event-top">
                <div>
                    <strong>${dateTxt}</strong><br>
                    ${e.titre || ""}
                    ${e.lieu ? `<br>📍 ${e.lieu}` : ""}
                    ${e.description ? `<br><small>${e.description}</small>` : ""}
                </div>
                <button onclick="editEvent('${e.id}')">✏️</button>
            </div>
        `;

        list.appendChild(div);
    });
}

// 📅 mois
function formatMonth(m) {
    let [mois, an] = m.split("-");
    const noms = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
    return noms[parseInt(mois)-1] + " " + an;
}

// 🪟 popup
function openModal(event=null) {

    if (!checkCode()) {
        alert("Accès refusé");
        return;
    }

    document.getElementById("modal").style.display = "block";

    if (event) {
        selectedId = event.id;
        document.getElementById("deleteBtn").style.display = "block";

        document.getElementById("dateDebut").value = event.dateDebut.split("-").reverse().join("-");
        document.getElementById("dateFin").value = (event.dateFin || event.dateDebut).split("-").reverse().join("-");
        document.getElementById("titre").value = event.titre;
        document.getElementById("type").value = event.type;
        document.getElementById("lieu").value = event.lieu || "";
        document.getElementById("description").value = event.description || "";

    } else {
        selectedId = null;
        document.getElementById("deleteBtn").style.display = "none";

        let today = new Date().toISOString().split("T")[0];

        document.getElementById("dateDebut").value = today;
        document.getElementById("dateFin").value = today;
        document.getElementById("titre").value = "";
        document.getElementById("lieu").value = "";
        document.getElementById("description").value = "";
    }
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// ✏️ edit
function editEvent(id) {
    let e = allEvents.find(ev => ev.id === id);
    openModal(e);
}

// 💾 save
function saveEvent() {

    if (!checkCode()) return;

    let d1 = document.getElementById("dateDebut").value;
    let d2 = document.getElementById("dateFin").value;

    let data = {
        dateDebut: d1.split("-").reverse().join("-"),
        dateFin: d2.split("-").reverse().join("-"),
        titre: document.getElementById("titre").value,
        type: document.getElementById("type").value,
        lieu: document.getElementById("lieu").value,
        description: document.getElementById("description").value
    };

    if (selectedId) {
        db.collection("events").doc(selectedId).update(data)
        .then(() => { closeModal(); chargerEvents(); });
    } else {
        db.collection("events").add(data)
        .then(() => { closeModal(); chargerEvents(); });
    }
}

// 🗑️ delete
function deleteEvent() {

    if (!checkCode()) return;

    if (!selectedId) return;

    if (!confirm("Supprimer cet événement ?")) return;

    db.collection("events").doc(selectedId).delete()
    .then(() => { closeModal(); chargerEvents(); });
}

// INIT
chargerEvents();
document.getElementById("filtre").addEventListener("change", afficherEvents);

</script>
