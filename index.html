<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda ASCM</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}

header {
    background:#e30613;
    color:white;
    text-align:center;
    padding:20px;
}

header img {
    width:80px;
    display:block;
    margin:0 auto 10px;
}

.container {
    padding:20px;
}

button, select {
    padding:8px;
    margin:5px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.month {
    background:white;
    margin-bottom:15px;
    padding:10px;
    border-radius:6px;
}

@media print {
    button, select {
        display:none;
    }
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Agenda ASCM</h1>
<select id="annee" onchange="afficher()"></select>
</header>

<div class="container">

<button onclick="ajouterEvent()">➕ Ajouter</button>
<button onclick="window.print()">🖨️ Imprimer / PDF</button>

<div id="agenda"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔑 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBgutofgSF2iOaZDfeADtEw6Djt8oEQLGA",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let events = [];

// 🔄 CHARGER LES DONNÉES
async function charger() {
    events = [];

    const snapshot = await getDocs(collection(db, "events"));

    snapshot.forEach(d => {
        let e = d.data();
        e.id = d.id;
        events.push(e);
    });

    initAnnees();
    afficher();
}

// ➕ AJOUT
async function ajouterEvent() {
    let date = prompt("Date JJ-MM-AAAA");
    let titre = prompt("Titre");

    if (!date || !titre) return;

    await addDoc(collection(db, "events"), {date, titre});
    await charger();
}

// 🗑️ SUPPRESSION
async function supprimerEvent(id) {
    if (!confirm("Supprimer ?")) return;

    await deleteDoc(doc(db, "events", id));
    await charger();
}

// 📅 GESTION DES ANNÉES
function initAnnees() {
    let select = document.getElementById("annee");
    select.innerHTML = "";

    let annees = [...new Set(events.map(e => e.date.split("-")[2]))];

    if (annees.length === 0) return;

    annees.sort();

    annees.forEach(a => {
        let opt = document.createElement("option");
        opt.value = a;
        opt.textContent = a;
        select.appendChild(opt);
    });

    select.value = annees[annees.length - 1];
}

// 📋 AFFICHAGE
function afficher() {

    let annee = document.getElementById("annee").value;

    let mois = [
        "janvier","fevrier","mars","avril","mai","juin",
        "juillet","aout","septembre","octobre","novembre","decembre"
    ];

    let container = document.getElementById("agenda");
    container.innerHTML = "";

    mois.forEach((nom, i) => {

        let div = document.createElement("div");
        div.className = "month";

        let html = "<h3>" + nom + "</h3>";

        let evs = events.filter(e => {
            let p = e.date.split("-");
            return p[2] === annee && parseInt(p[1]) === i+1;
        });

        if (evs.length === 0) {
            html += "<i>Aucun événement</i>";
        }

        evs.forEach(e => {
            html += `
            ${e.date} - ${e.titre}
            <button onclick="supprimerEvent('${e.id}')">🗑️</button><br>
            `;
        });

        div.innerHTML = html;
        container.appendChild(div);
    });
}

// 🔥 RENDRE ACCESSIBLE AUX BOUTONS
window.ajouterEvent = ajouterEvent;
window.supprimerEvent = supprimerEvent;

// 🚀 INIT
charger();

</script>

</body>
</html>
