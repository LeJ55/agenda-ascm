<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgutofgSF2iOaZDfeADtEw6Djt8oEQLGA",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let events = [];

// 🔄 CHARGER
async function charger() {
    events = [];

    const snapshot = await getDocs(collection(db, "events"));

    snapshot.forEach(d => {
        let e = d.data();
        e.id = d.id;
        events.push(e);
    });

    console.log("Events chargés :", events);

    initAnnees();
    afficher();
}

// ➕ AJOUT
async function ajouter() {
    let date = prompt("Date JJ-MM-AAAA");
    let titre = prompt("Titre");

    if (!date || !titre) return;

    await addDoc(collection(db, "events"), {date, titre});

    await charger(); // 🔥 important
}

// 🗑️ SUPPRIMER
async function supprimer(id) {
    if (!confirm("Supprimer ?")) return;

    await deleteDoc(doc(db, "events", id));

    await charger();
}

// 📅 ANNEES
function initAnnees() {
    let select = document.getElementById("annee");
    select.innerHTML = "";

    let annees = [...new Set(events.map(e => e.date.split("-")[2]))];

    if (annees.length === 0) return;

    annees.sort();

    annees.forEach(a => {
        let opt = document.createElement("option");
        opt.value = a;
        opt.textContent = a;
        select.appendChild(opt);
    });

    // 🔥 sélection auto
    select.value = annees[annees.length - 1];
}
