<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda ASCM</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
    background:#e30613;
    color:white;
    text-align:center;
    padding:15px;
}

header img { width:60px; }

.controls {
    text-align:center;
    padding:10px;
}

button, select, input, textarea {
    padding:10px;
    margin:5px;
    font-size:16px;
    border-radius:6px;
    width:90%;
    max-width:300px;
}

.create-btn {
    background:#e30613;
    color:white;
}

#list {
    max-width:600px;
    margin:20px auto;
}

.month {
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.event {
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
}

.reunion { border-left:5px solid #28a745; }
.match { border-left:5px solid #007bff; }
.evenement { border-left:5px solid #fd7e14; }

.event-top {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* popup */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
    z-index:9999;
    overflow:auto;
}

.modal-content { padding:20px; }

textarea { height:80px; }

@media (min-width:768px) {
    .modal {
        background:rgba(0,0,0,0.5);
        display:none;
        justify-content:center;
        align-items:center;
    }
    .modal-content {
        background:white;
        border-radius:8px;
        width:350px;
        margin:auto;
    }
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Agenda ASCM</h1>
<button onclick="window.print()">🖨️ PDF</button>
</header>

<div class="controls">

<button class="create-btn" onclick="openModal()">➕ Créer un événement</button>

<br>

<select id="filtre">
    <option value="all">Tout</option>
    <option value="reunion">Réunions</option>
    <option value="match">Matchs</option>
    <option value="evenement">Événements</option>
</select>

</div>

<div id="list"></div>

<!-- POPUP -->
<div class="modal" id="modal">
    <div class="modal-content">

        <h3>Événement</h3>

        <label>Début</label>
        <input type="date" id="dateDebut">

        <label>Fin</label>
        <input type="date" id="dateFin">

        <input type="text" id="titre" placeholder="Titre">

        <input type="text" id="lieu" placeholder="Lieu (facultatif)">

        <textarea id="description" placeholder="Description (facultatif)"></textarea>

        <select id="type">
            <option value="reunion">Réunion</option>
            <option value="match">Match</option>
            <option value="evenement">Événement</option>
        </select>

        <button onclick="saveEvent()">💾 Enregistrer</button>

        <button onclick="deleteEvent()" id="deleteBtn"
        style="display:none;background:#dc3545;color:white;">
        🗑️ Supprimer
        </button>

        <button onclick="closeModal()">❌ Fermer</button>

    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 CONFIG FIREBASE (TA VRAIE CONFIG)
const firebaseConfig = {
  apiKey: "AIzaSyBgutofgSF2iOaZDfeADtEw6Djt8oEQLGA",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm",
  storageBucket: "agenda-ascm.firebasestorage.app",
  messagingSenderId: "766290554972",
  appId: "1:766290554972:web:48a84c36a44ea9ce5bb699",
  measurementId: "G-5VM9QEQ29V"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedId = null;
let allEvents = [];

// 🔒 CODE ADMIN
const ADMIN_CODE = "0208";
let isAdmin = false;

function checkCode() {
    if (isAdmin) return true;
    let code = prompt("Code administrateur :");
    if (code === ADMIN_CODE) {
        isAdmin = true;
        return true;
    }
    return false;
}

// 🔄 CHARGER
function chargerEvents() {

    db.collection("events").get().then(snapshot => {

        allEvents = [];

        snapshot.forEach(doc => {
            let e = doc.data();

            if (!e.dateDebut) {
                e.dateDebut = e.date;
                e.dateFin = e.date;
            }

            e.id = doc.id;
            allEvents.push(e);
        });

        afficherEvents();
    });
}

// 🔍 AFFICHER
function afficherEvents() {

    let list = document.getElementById("list");
    list.innerHTML = "";

    let filtre = document.getElementById("filtre").value;

    let events = allEvents
        .filter(e => filtre === "all" || e.type === filtre)
        .sort((a,b) => {
            let da = a.dateDebut.split("-").reverse().join("");
            let db = b.dateDebut.split("-").reverse().join("");
            return da - db;
        });

    let currentMonth = "";

    events.forEach(e => {

        let parts = e.dateDebut.split("-");
        let mois = parts[1] + "-" + parts[2];

        if (mois !== currentMonth) {
            currentMonth = mois;

            let m = document.createElement("div");
            m.className = "month";
            m.innerText = formatMonth(mois);
            list.appendChild(m);
        }

        let dateTxt = e.dateDebut;
        if (e.dateFin && e.dateFin !== e.dateDebut) {
            dateTxt += " → " + e.dateFin;
        }

        let div = document.createElement("div");
        div.className = "event " + e.type;

        div.innerHTML = `
            <div class="event-top">
                <div>
                    <strong>${dateTxt}</strong><br>
                    ${e.titre || ""}
                    ${e.lieu ? `<br>📍 ${e.lieu}` : ""}
                    ${e.description ? `<br><small>${e.description}</small>` : ""}
                </div>
               <button class="edit-btn" onclick="editEvent('${e.id}')">✏️</button>
        `;

        list.appendChild(div);
    });
}

// 📅 FORMAT MOIS
function formatMonth(m) {
    let [mois, an] = m.split("-");
    const noms = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
    return noms[parseInt(mois)-1] + " " + an;
}

// 🪟 MODAL
function openModal(event=null) {

    if (!checkCode()) {
        alert("Accès refusé");
        return;
    }

    document.getElementById("modal").style.display = "block";

    if (event) {
        selectedId = event.id;
        document.getElementById("deleteBtn").style.display = "block";

        document.getElementById("dateDebut").value = event.dateDebut.split("-").reverse().join("-");
        document.getElementById("dateFin").value = (event.dateFin || event.dateDebut).split("-").reverse().join("-");
        document.getElementById("titre").value = event.titre;
        document.getElementById("type").value = event.type;
        document.getElementById("lieu").value = event.lieu || "";
        document.getElementById("description").value = event.description || "";

    } else {
        selectedId = null;
        document.getElementById("deleteBtn").style.display = "none";

        let today = new Date().toISOString().split("T")[0];

        document.getElementById("dateDebut").value = today;
        document.getElementById("dateFin").value = today;
        document.getElementById("titre").value = "";
        document.getElementById("lieu").value = "";
        document.getElementById("description").value = "";
    }
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// ✏️ EDIT
function editEvent(id) {
    let e = allEvents.find(ev => ev.id === id);
    openModal(e);
}

// 💾 SAVE
function saveEvent() {

    if (!checkCode()) return;

    let d1 = document.getElementById("dateDebut").value;
    let d2 = document.getElementById("dateFin").value;

    let data = {
        dateDebut: d1.split("-").reverse().join("-"),
        dateFin: d2.split("-").reverse().join("-"),
        titre: document.getElementById("titre").value,
        type: document.getElementById("type").value,
        lieu: document.getElementById("lieu").value,
        description: document.getElementById("description").value
    };

    if (selectedId) {
        db.collection("events").doc(selectedId).update(data)
        .then(() => { closeModal(); chargerEvents(); });
    } else {
        db.collection("events").add(data)
        .then(() => { closeModal(); chargerEvents(); });
    }
}

// 🗑️ DELETE
function deleteEvent() {

    if (!checkCode()) return;

    if (!selectedId) return;

    if (!confirm("Supprimer cet événement ?")) return;

    db.collection("events").doc(selectedId).delete()
    .then(() => { closeModal(); chargerEvents(); });
}

// INIT
chargerEvents();
document.getElementById("filtre").addEventListener("change", afficherEvents);

</script>

</body>
</html>
