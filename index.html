<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda ASCM</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
    background:#e30613;
    color:white;
    text-align:center;
    padding:20px;
}

header img {
    width:80px;
    display:block;
    margin:0 auto 10px;
}

.container { padding:20px; }

button, select {
    padding:8px;
    margin:5px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.month {
    background:white;
    margin-bottom:15px;
    padding:10px;
    border-radius:6px;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Agenda ASCM</h1>
<select id="annee"></select>
</header>

<div class="container">

<button id="btnAdd">➕ Ajouter</button>
<button id="btnPrint">🖨️ Imprimer / PDF</button>

<div id="agenda"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgutofgSF2iOaZDfeADtEw6Djt8oEQLGA",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let events = [];

// 🔄 CHARGER
async function charger() {
    events = [];

    const snapshot = await getDocs(collection(db, "events"));

    snapshot.forEach(d => {
        let e = d.data();
        e.id = d.id;
        events.push(e);
    });

    initAnnees();
    afficher();
}

// ➕ AJOUT
async function ajouterEvent() {
    let date = prompt("Date JJ-MM-AAAA");
    let titre = prompt("Titre");

    if (!date || !titre) return;

    await addDoc(collection(db, "events"), {date, titre});
    await charger();
}

// 🗑️ SUPPRESSION
async function supprimerEvent(id) {
    if (!confirm("Supprimer ?")) return;

    await deleteDoc(doc(db, "events", id));
    await charger();
}

// 📅 ANNEES
function initAnnees() {
    const select = document.getElementById("annee");
    select.innerHTML = "";

    let annees = [...new Set(events.map(e => e.date.split("-")[2]))];

    if (annees.length === 0) return;

    annees.sort();

    annees.forEach(a => {
        let opt = document.createElement("option");
        opt.value = a;
        opt.textContent = a;
        select.appendChild(opt);
    });

    select.value = annees[annees.length - 1];

    select.onchange = afficher;
}

// 📋 AFFICHAGE
function afficher() {

    const annee = document.getElementById("annee").value;

    const mois = [
        "janvier","fevrier","mars","avril","mai","juin",
        "juillet","aout","septembre","octobre","novembre","decembre"
    ];

    const container = document.getElementById("agenda");
    container.innerHTML = "";

    mois.forEach((nom, i) => {

        let div = document.createElement("div");
        div.className = "month";

        let html = "<h3>" + nom + "</h3>";

        let evs = events.filter(e => {
            let p = e.date.split("-");
            return p[2] === annee && parseInt(p[1]) === i+1;
        });

        if (evs.length === 0) {
            html += "<i>Aucun événement</i>";
        }

        evs.forEach(e => {
            html += `
            ${e.date} - ${e.titre}
            <button class="delete" data-id="${e.id}">🗑️</button><br>
            `;
        });

        div.innerHTML = html;
        container.appendChild(div);
    });

    // 🔥 gestion suppression après affichage
    document.querySelectorAll(".delete").forEach(btn => {
        btn.addEventListener("click", () => {
            supprimerEvent(btn.dataset.id);
        });
    });
}

// 🔘 BOUTONS
document.getElementById("btnAdd").addEventListener("click", ajouterEvent);
document.getElementById("btnPrint").addEventListener("click", () => window.print());

// INIT
charger();

</script>

</body>
</html>
