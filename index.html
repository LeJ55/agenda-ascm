<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda ASCM</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#e30613; color:white; text-align:center; padding:20px; }
.container { padding:20px; }
button, select { padding:8px; margin:5px; }
.month { background:white; margin-bottom:15px; padding:10px; }
</style>
</head>

<body>

<header>
<h1>Agenda ASCM</h1>
<select id="annee"></select>
</header>

<div class="container">

<button id="add">➕ Ajouter</button>
<button onclick="window.print()">🖨️ PDF</button>

<div id="agenda"></div>

</div>

<!-- 🔥 FIREBASE VERSION SIMPLE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

alert("JS OK");

// 🔑 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBgutofgSF2iOaZDfeADtEw6Djt8oEQLGA",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let events = [];

// 🔄 CHARGER
function charger() {
    events = [];

    db.collection("events").get().then(snapshot => {

        snapshot.forEach(doc => {
            let e = doc.data();
            e.id = doc.id;
            events.push(e);
        });

        initAnnees();
        afficher();
    });
}

// ➕ AJOUT
document.getElementById("add").onclick = function() {
    let date = prompt("Date JJ-MM-AAAA");
    let titre = prompt("Titre");

    if (!date || !titre) return;

    db.collection("events").add({date, titre}).then(() => {
        charger();
    });
};

// 🗑️ SUPPRIMER
function supprimer(id) {
    db.collection("events").doc(id).delete().then(() => {
        charger();
    });
}

// 📅 ANNEES
function initAnnees() {
    let select = document.getElementById("annee");
    select.innerHTML = "";

    let annees = [...new Set(events.map(e => e.date.split("-")[2]))];

    if (annees.length === 0) return;

    annees.sort();

    annees.forEach(a => {
        let opt = document.createElement("option");
        opt.value = a;
        opt.textContent = a;
        select.appendChild(opt);
    });

    select.value = annees[annees.length - 1];

    select.onchange = afficher;
}

// 📋 AFFICHAGE
function afficher() {

    let annee = document.getElementById("annee").value;

    let mois = [
        "janvier","fevrier","mars","avril","mai","juin",
        "juillet","aout","septembre","octobre","novembre","decembre"
    ];

    let container = document.getElementById("agenda");
    container.innerHTML = "";

    mois.forEach((nom, i) => {

        let div = document.createElement("div");
        div.className = "month";

        let html = "<h3>" + nom + "</h3>";

        let evs = events.filter(e => {
            let p = e.date.split("-");
            return p[2] === annee && parseInt(p[1]) === i+1;
        });

        if (evs.length === 0) {
            html += "<i>Aucun événement</i>";
        }

        evs.forEach(e => {
            html += `
            ${e.date} - ${e.titre}
            <button onclick="supprimer('${e.id}')">🗑️</button><br>
            `;
        });

        div.innerHTML = html;
        container.appendChild(div);
    });
}

// INIT
charger();

</script>

</body>
</html>
