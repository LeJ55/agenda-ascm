<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Firebase</title>
</head>

<body>

<h1>Test Firebase</h1>

<button onclick="testWrite()">➕ Test écriture</button>
<button onclick="testRead()">📖 Test lecture</button>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBgutofgSF2iOaZDfeADtEw6Djt8oEQLGA",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

console.log("Firebase lancé");

// 🔥 TEST ÉCRITURE
function testWrite() {
    db.collection("events").add({
        date: "01-01-2026",
        titre: "Test Firebase"
    })
    .then(() => {
        alert("✅ Écriture OK");
        console.log("Ajout réussi");
    })
    .catch(err => {
        alert("❌ Erreur écriture");
        console.error(err);
    });
}

// 🔥 TEST LECTURE
function testRead() {
    db.collection("events").get()
    .then(snapshot => {
        console.log("Nombre docs :", snapshot.size);

        snapshot.forEach(doc => {
            console.log(doc.data());
        });

        alert("📖 Lecture OK (regarde la console)");
    })
    .catch(err => {
        alert("❌ Erreur lecture");
        console.error(err);
    });
}

</script>

</body>
</html>
