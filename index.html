<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgutofgSF2iOaZDfeADtEw6Djt8oEQLGA",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm",
  storageBucket: "agenda-ascm.firebasestorage.app",
  messagingSenderId: "766290554972",
  appId: "1:766290554972:web:48a84c36a44ea9ce5bb699",
  measurementId: "G-5VM9QEQ29V"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let events = [];

async function charger() {
    events = [];
    const snapshot = await getDocs(collection(db, "events"));

    snapshot.forEach(d => {
        let e = d.data();
        e.id = d.id;
        events.push(e);
    });

    afficher();
}

async function ajouter() {
    let date = prompt("Date JJ-MM-AAAA");
    let titre = prompt("Titre");

    if (!date || !titre) return;

    await addDoc(collection(db, "events"), {date, titre});
    charger();
}

async function supprimer(id) {
    await deleteDoc(doc(db, "events", id));
    charger();
}

function afficher() {
    let container = document.getElementById("agenda");
    container.innerHTML = "";

    events.forEach(e => {
        container.innerHTML += `
        ${e.date} - ${e.titre}
        <button onclick="supprimer('${e.id}')">🗑️</button><br>`;
    });
}

charger();

window.ajouter = ajouter;
window.supprimer = supprimer;

</script>
