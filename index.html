<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda ASCM</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}

header {
    background:#e30613;
    color:white;
    text-align:center;
    padding:15px;
}

header img { width:60px; }

.controls {
    text-align:center;
    padding:10px;
}

button, select, input {
    padding:10px;
    margin:5px;
    font-size:16px;
    border-radius:6px;
}

.create-btn {
    background:#e30613;
    color:white;
    width:90%;
    max-width:300px;
}

#list {
    max-width:600px;
    margin:20px auto;
}

.event {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.date {
    font-weight:bold;
}

/* couleurs */
.reunion { border-left:5px solid #28a745; }
.match { border-left:5px solid #007bff; }
.evenement { border-left:5px solid #fd7e14; }

/* popup */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
    z-index:9999;
}

.modal-content {
    padding:20px;
}

@media (min-width:768px) {
    .modal {
        background:rgba(0,0,0,0.5);
        display:none;
        justify-content:center;
        align-items:center;
    }
    .modal-content {
        background:white;
        border-radius:8px;
        width:350px;
        margin:auto;
    }
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Agenda ASCM</h1>
<button onclick="window.print()">🖨️ PDF</button>
</header>

<div class="controls">

<button class="create-btn" onclick="openModal()">➕ Créer un événement</button>

<br>

<select id="filtre">
    <option value="all">Tout</option>
    <option value="reunion">Réunions</option>
    <option value="match">Matchs</option>
    <option value="evenement">Événements</option>
</select>

</div>

<div id="list"></div>

<!-- POPUP -->
<div class="modal" id="modal">
    <div class="modal-content">

        <h3>Événement</h3>

        <input type="date" id="dateEvent">
        <input type="text" id="titre" placeholder="Titre">

        <select id="type">
            <option value="reunion">Réunion</option>
            <option value="match">Match</option>
            <option value="evenement">Événement</option>
        </select>

        <button onclick="saveEvent()">💾 Enregistrer</button>

        <button onclick="deleteEvent()" id="deleteBtn"
        style="display:none;background:#dc3545;color:white;">
        🗑️ Supprimer
        </button>

        <button onclick="closeModal()">❌ Fermer</button>

    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedId = null;
let allEvents = [];

// 🔄 charger
function chargerEvents() {

    db.collection("events").get().then(snapshot => {

        allEvents = [];

        snapshot.forEach(doc => {
            let e = doc.data();
            e.id = doc.id;
            allEvents.push(e);
        });

        afficherEvents();
    });
}

// 🔍 afficher
function afficherEvents() {

    let list = document.getElementById("list");
    list.innerHTML = "";

    let filtre = document.getElementById("filtre").value;

    let events = allEvents
        .filter(e => filtre === "all" || e.type === filtre)
        .sort((a,b) => {
            let da = a.date.split("-").reverse().join("");
            let db = b.date.split("-").reverse().join("");
            return da - db;
        });

    events.forEach(e => {

        let div = document.createElement("div");
        div.className = "event " + e.type;

        div.innerHTML = `
            <div>
                <div class="date">${e.date}</div>
                <div>${e.titre}</div>
            </div>
            <button onclick="editEvent('${e.id}')">✏️</button>
        `;

        list.appendChild(div);
    });
}

// 🪟 popup
function openModal(event=null) {

    modal.style.display = "block";

    if (event) {
        selectedId = event.id;
        deleteBtn.style.display = "block";

        dateEvent.value = event.date.split("-").reverse().join("-");
        titre.value = event.titre;
        type.value = event.type;

    } else {
        selectedId = null;
        deleteBtn.style.display = "none";

        dateEvent.value = new Date().toISOString().split("T")[0];
        titre.value = "";
    }
}

function closeModal() {
    modal.style.display = "none";
}

// ✏️ edit
function editEvent(id) {
    let e = allEvents.find(ev => ev.id === id);
    openModal(e);
}

// 💾 save
function saveEvent() {

    let dateISO = dateEvent.value;
    let dateFR = dateISO.split("-").reverse().join("-");

    let data = {
        date: dateFR,
        titre: titre.value,
        type: type.value
    };

    if (selectedId) {
        db.collection("events").doc(selectedId).update(data)
        .then(() => { closeModal(); chargerEvents(); });
    } else {
        db.collection("events").add(data)
        .then(() => { closeModal(); chargerEvents(); });
    }
}

// 🗑️ delete
function deleteEvent() {

    if (!selectedId) return;

    if (!confirm("Supprimer cet événement ?")) return;

    db.collection("events").doc(selectedId).delete()
    .then(() => { closeModal(); chargerEvents(); });
}

// INIT
chargerEvents();
document.getElementById("filtre").addEventListener("change", afficherEvents);

</script>

</body>
</html>
