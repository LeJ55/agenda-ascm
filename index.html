<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda ASCM</title>

<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body { font-family: Arial; margin:0; }

header {
    background:#e30613;
    color:white;
    text-align:center;
    padding:20px;
}

#calendar {
    max-width:900px;
    margin:20px auto;
}
</style>
</head>

<body>

<header>
<h1>Agenda ASCM</h1>
<button onclick="window.print()">🖨️ Export PDF</button>
</header>

<div id="calendar"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBgutofgSF2iOaZDfeADtEw6Djt8oEQLGA",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let calendar;

// 🔄 CONVERTIR DATE
function formatDate(dateStr) {
    let p = dateStr.split("-");
    return `${p[2]}-${p[1]}-${p[0]}`; // YYYY-MM-DD
}

// 🔄 CHARGER EVENTS
function chargerEvents() {

    db.collection("events").get().then(snapshot => {

        let events = [];

        snapshot.forEach(doc => {
            let e = doc.data();

            events.push({
                id: doc.id,
                title: e.titre,
                start: formatDate(e.date)
            });
        });

        calendar.removeAllEvents();
        calendar.addEventSource(events);
    });
}

// INIT CALENDAR
document.addEventListener('DOMContentLoaded', function() {

    let calendarEl = document.getElementById('calendar');

    calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: 'dayGridMonth',

        locale: 'fr',

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: ''
        },

        dateClick: function(info) {
            let titre = prompt("Titre de l'événement");

            if (!titre) return;

            let date = info.dateStr.split("-").reverse().join("-");

            db.collection("events").add({
                date: date,
                titre: titre
            }).then(() => chargerEvents());
        },

        eventClick: function(info) {

            if (confirm("Supprimer cet événement ?")) {
                db.collection("events").doc(info.event.id).delete()
                .then(() => chargerEvents());
            }
        }

    });

    calendar.render();
    chargerEvents();
});

</script>

</body>
</html>
