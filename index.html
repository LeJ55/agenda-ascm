<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda ASCM</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
    background:#e30613;
    color:white;
    text-align:center;
    padding:15px;
}

header img { width:60px; }

.controls {
    text-align:center;
    padding:10px;
}

button, select, input {
    padding:10px;
    margin:5px;
    font-size:16px;
    border-radius:6px;
}

.create-btn {
    background:#e30613;
    color:white;
    width:90%;
    max-width:300px;
}

#calendar {
    max-width:1000px;
    margin:10px auto;
    background:white;
    padding:10px;
    border-radius:8px;
}

/* POPUP */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
    z-index:9999;
    overflow:auto;
}

.modal-content {
    padding:20px;
}

@media (min-width:768px) {
    .modal {
        background:rgba(0,0,0,0.5);
        display:none;
        justify-content:center;
        align-items:center;
    }
    .modal-content {
        background:white;
        border-radius:8px;
        width:350px;
        margin:auto;
    }
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Agenda ASCM</h1>
<button onclick="window.print()">🖨️ PDF</button>
</header>

<div class="controls">

<button class="create-btn" onclick="openModal()">➕ Créer un événement</button>

<br>

<select id="filtre">
    <option value="all">Tout</option>
    <option value="reunion">Réunions</option>
    <option value="match">Matchs</option>
    <option value="evenement">Événements</option>
</select>

</div>

<div id="calendar"></div>

<!-- POPUP -->
<div class="modal" id="modal">
    <div class="modal-content">

        <h3>Événement</h3>

        <input type="date" id="dateEvent">
        <input type="text" id="titre" placeholder="Titre">

        <label>Début</label>
        <input type="time" id="heureDebut">

        <label>Fin</label>
        <input type="time" id="heureFin">

        <select id="type">
            <option value="reunion">Réunion</option>
            <option value="match">Match</option>
            <option value="evenement">Événement</option>
        </select>

        <button onclick="saveEvent()">💾 Enregistrer</button>

        <button onclick="deleteEvent()" id="deleteBtn"
        style="display:none;background:#dc3545;color:white;">
        🗑️ Supprimer
        </button>

        <button onclick="closeModal()">❌ Fermer</button>

    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "agenda-ascm.firebaseapp.com",
  projectId: "agenda-ascm"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let calendar;
let selectedId = null;
let allEvents = [];

// 🎨 couleurs
function getColor(type) {
    if (type === "reunion") return "#28a745";
    if (type === "match") return "#007bff";
    if (type === "evenement") return "#fd7e14";
}

// 🔄 format
function toISO(date, heure) {
    let p = date.split("-");
    return `${p[2]}-${p[1]}-${p[0]}T${heure}`;
}

// 🔄 charger
function chargerEvents() {

    db.collection("events").get().then(snapshot => {

        allEvents = [];

        snapshot.forEach(doc => {
            let e = doc.data();

            allEvents.push({
                id: doc.id,
                title: e.titre,
                start: toISO(e.date, e.heureDebut || "00:00"),
                end: toISO(e.date, e.heureFin || "01:00"),
                type: e.type,
                backgroundColor: getColor(e.type)
            });
        });

        afficherEvents();
    });
}

// 🔍 filtre
function afficherEvents() {

    let f = filtre.value;

    let events = allEvents.filter(e => {
        if (f === "all") return true;
        return e.type === f;
    });

    calendar.removeAllEvents();
    calendar.addEventSource(events);
}

// 🪟 popup
function openModal(date=null, event=null) {

    modal.style.display = "block";

    if (event) {
        selectedId = event.id;
        deleteBtn.style.display = "block";

        let d = new Date(event.start);

        dateEvent.value = d.toISOString().split("T")[0];
        titre.value = event.title;
        type.value = event.extendedProps.type;

    } else {
        selectedId = null;
        deleteBtn.style.display = "none";

        dateEvent.value = date || new Date().toISOString().split("T")[0];
        titre.value = "";
    }

    heureDebut.value = "18:00";
    heureFin.value = "19:00";
}

function closeModal() {
    modal.style.display = "none";
}

// 💾 save
function saveEvent() {

    let dateFR = dateEvent.value.split("-").reverse().join("-");

    let data = {
        date: dateFR,
        titre: titre.value,
        heureDebut: heureDebut.value,
        heureFin: heureFin.value,
        type: type.value
    };

    if (selectedId) {
        db.collection("events").doc(selectedId).update(data)
        .then(() => { closeModal(); chargerEvents(); });
    } else {
        db.collection("events").add(data)
        .then(() => { closeModal(); chargerEvents(); });
    }
}

// 🗑️ delete
function deleteEvent() {

    if (!selectedId) return;

    if (!confirm("Supprimer ?")) return;

    db.collection("events").doc(selectedId).delete()
    .then(() => { closeModal(); chargerEvents(); });
}

// INIT
document.addEventListener('DOMContentLoaded', function() {

    calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: window.innerWidth < 768 ? 'listWeek' : 'multiMonthYear',

        locale: 'fr',
        firstDay: 1,

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,listWeek'
        },

        dateClick: info => openModal(info.dateStr),
        eventClick: info => openModal(info.event.startStr, info.event)

    });

    calendar.render();
    chargerEvents();

    filtre.addEventListener("change", afficherEvents);
});

</script>

</body>
</html>
